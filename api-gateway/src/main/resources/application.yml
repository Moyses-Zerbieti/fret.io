server:
  port: 8080

spring:
  application:
    name: api-gateway

  redis:
    host: redis
    port: 6379

  cloud:
    gateway:
      routes:
        - id: auth-public
          uri: http://localhost:8081
          predicates:
            - Path=/auth/register, /auth/login, /auth/refresh, /auth/forgot-password, /auth/reset-password/**, /auth/status/**, /.well-known/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-private
          uri: http://localhost:8081
          predicates:
            - Path=/auth/logout
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      show-details: always