spring:
  application:
    name: auth-service

  datasource:
    url: ##
    username: ##
    password: ##
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 30000
      pool-name: auth-service-db-pool
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true