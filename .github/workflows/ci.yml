name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [auth-service, company-service, driver-service, cargo-service, matching-service]
        
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
        
      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build e testes
        working-directory: ./${{ matrix.service }}
        run: ./mvnw clean verify  
